plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// Read .env from project root
def envProps = new Properties()
def envFile = rootProject.file('../.env')
if (envFile.exists()) {
    envFile.eachLine { line ->
        line = line.trim()
        if (!line.startsWith('#') && line.contains('=')) {
            def idx = line.indexOf('=')
            envProps[line.substring(0, idx).trim()] = line.substring(idx + 1).trim()
        }
    }
}

// Decode base64 keystore from .env into OS temp directory
def keystoreFile = new File(System.getProperty("java.io.tmpdir"), "pokyh_release.jks")
def keystoreBase64 = envProps['KEYSTORE_BASE64']
if (keystoreBase64) {
    keystoreFile.bytes = Base64.decoder.decode(keystoreBase64)
}

android {
    namespace = "dev.plattnericus.project"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
        release {
            storeFile = keystoreFile
            storePassword = envProps['KEYSTORE_STORE_PASSWORD'] ?: "android"
            keyAlias = envProps['KEYSTORE_KEY_ALIAS'] ?: "androiddebugkey"
            keyPassword = envProps['KEYSTORE_KEY_PASSWORD'] ?: "android"
        }
    }

    defaultConfig {
        applicationId = "dev.plattnericus.project"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
}
