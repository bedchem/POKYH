name: pockyh
description: "WebUntis Stundenplan, Noten App & Mensaplan von Plattnericus (Nexor) & Ryhox"
publish_to: 'none'
version: 1.1.13+1

environment:
  sdk: ^3.11.4

dependencies:
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  package_info_plus: ^8.0.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  shared_preferences: ^2.2.0
  haptic_feedback: ^0.6.4+3
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^5.0.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - .env

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/POKYH_icon.png"